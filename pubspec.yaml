name: texnik_ijodkorlik
description: Texnik ijodkorlik va konstruksiyalash fanini o'qitish uchun mobil o'quv ilovasi.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  flutter_animate: ^4.5.0
  youtube_player_iframe: ^5.2.0
  webview_flutter: ^4.0.0
  archive: ^3.6.1
  xml: ^6.5.0
  path_provider: ^2.1.4
  open_filex: ^4.1.0
  web: ^1.1.0
  pdf: ^3.11.1
  printing: ^5.13.4

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/content/
    - assets/materials/topic_1/amaliyot/
    - assets/materials/topic_2/amaliyot/
    - assets/materials/topic_3/amaliyot/
    - assets/materials/topic_4/amaliyot/
    - assets/materials/topic_5/amaliyot/
    - assets/materials/topic_6/amaliyot/
    - assets/materials/topic_7/amaliyot/
    - assets/materials/topic_8/amaliyot/
    - assets/materials/topic_1/resurs/
    - assets/materials/topic_2/resurs/
    - assets/materials/topic_3/resurs/
    - assets/materials/topic_4/resurs/
    - assets/materials/topic_5/resurs/
    - assets/materials/topic_6/resurs/
    - assets/materials/topic_7/resurs/
    - assets/materials/topic_8/resurs/
    - assets/images/
